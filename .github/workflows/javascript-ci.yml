name: CI - JavaScript/Typescript/Node Projects
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'javascript/**'
  pull_request:
    paths:
      - 'javascript/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: javascript
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npx nx run-many -t build,test --skip-nx-cache
      - name: Check Changesets (PR only)
        if: github.event_name == 'pull_request'
        run: npx changeset status

  release:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: javascript
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build all packages
        run: npx nx run-many -t build --skip-nx-cache
      - name: Publish with Changesets
        id: publish
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Wait for npm registry propagation
        run: sleep 15
      - name: Post-publish smoke test
        run: |
          VERSION=$(node -p "require('./autogen-markdown-doc/package.json').version")
          bash scripts/post-publish-smoke-test.sh "$VERSION"