name: CI - JavaScript/Typescript/Node Projects

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'javascript/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'javascript/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: javascript
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CI
        run: npx nx run build-tools-workspace:ci --skip-nx-cache

      - name: Check Changesets (PR only)
        if: github.event_name == 'pull_request'
        run: npx changeset status

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: javascript
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: javascript/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build all packages
        run: npx nx run-many -t build --skip-nx-cache

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Auto-generate changeset from commits
        run: bash scripts/auto-changeset.sh

      - name: Apply version bumps
        run: npx changeset version

      - name: Commit and push version bumps
        run: |
          git add .
          git diff --staged --quiet && echo "No changesets to release" || \
            (git commit -m "chore: release [skip ci]" && git push)

      - name: Publish with Changesets
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM }}

      - name: Wait for npm registry propagation
        run: sleep 30

      - name: Post-publish smoke test
        run: |
          VERSION=$(node -p "require('./autogen-markdown-doc/package.json').version")
          cd autogen-markdown-doc && PUBLISHED_VERSION=$VERSION npx vitest run --config vitest.integration.config.ts

