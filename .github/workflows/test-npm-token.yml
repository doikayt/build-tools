name: Test NPM Token

on:
  workflow_dispatch:

jobs:
  test-token:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify npm token
        run: npm whoami && echo "SUCCESS - token is valid"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
