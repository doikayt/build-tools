name: Test NPM Token

on:
  workflow_dispatch:

jobs:
  test-token:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: npm ci
        working-directory: javascript

      - name: Build
        run: npx nx run update-markdown-uml:build --skip-nx-cache
        working-directory: javascript

      - name: Debug auth setup
        run: |
          echo "=== NPM_CONFIG_USERCONFIG ==="
          echo "$NPM_CONFIG_USERCONFIG"
          echo "=== contents of NPM_CONFIG_USERCONFIG ==="
          cat "$NPM_CONFIG_USERCONFIG" || echo "(file not found)"
          echo "=== TOKEN length ==="
          echo -n "$NODE_AUTH_TOKEN" | wc -c
          echo "=== npm whoami ==="
          npm whoami || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish update-markdown-uml directly
        run: npm publish --access public
        working-directory: javascript/update-markdown-uml
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
